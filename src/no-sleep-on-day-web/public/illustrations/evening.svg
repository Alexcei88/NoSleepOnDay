<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Вечер: за окном темно, дети сидят у телевизора">
  <defs>
    <linearGradient id="sky-evening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1740"/>
      <stop offset="100%" stop-color="#1E2A6E"/>
    </linearGradient>
    <linearGradient id="wall-evening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A416B"/>
      <stop offset="100%" stop-color="#272D52"/>
    </linearGradient>
    <radialGradient id="tv-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#F4A300" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#F4A300" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F4A300" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="couch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B4D8B"/>
      <stop offset="100%" stop-color="#3B3268"/>
    </linearGradient>
  </defs>

  <!-- стена -->
  <rect x="0" y="0" width="400" height="320" fill="url(#wall-evening)"/>

  <!-- ореол телевизора (на всю комнату) -->
  <ellipse cx="280" cy="220" rx="220" ry="140" fill="url(#tv-glow)"/>

  <!-- окно с тёмным небом -->
  <rect x="35" y="40" width="160" height="130" rx="6" fill="url(#sky-evening)" stroke="#0F1740" stroke-width="3"/>
  <line x1="115" y1="40" x2="115" y2="170" stroke="#0F1740" stroke-width="2.5" opacity="0.6"/>
  <line x1="35" y1="105" x2="195" y2="105" stroke="#0F1740" stroke-width="2.5" opacity="0.6"/>

  <!-- звёзды -->
  <g fill="#FAF8F4" opacity="0.85">
    <circle cx="65" cy="65" r="1.5"/>
    <circle cx="90" cy="55" r="1"/>
    <circle cx="135" cy="70" r="1.3"/>
    <circle cx="170" cy="60" r="1.2"/>
    <circle cx="80" cy="135" r="1"/>
    <circle cx="155" cy="140" r="1.5"/>
    <circle cx="175" cy="125" r="1"/>
  </g>

  <!-- луна -->
  <circle cx="160" cy="80" r="14" fill="#FAF8F4" opacity="0.95"/>
  <circle cx="166" cy="76" r="11" fill="#1E2A6E"/>

  <!-- часы на стене (показывают 19:00 — лето, рано, но темно) -->
  <circle cx="80" cy="205" r="22" fill="#FAF8F4" stroke="#1F2329" stroke-width="2.5"/>
  <line x1="80" y1="205" x2="80" y2="190" stroke="#1F2329" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="205" x2="92" y2="205" stroke="#1F2329" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="80" cy="205" r="2" fill="#1F2329"/>
  <text x="80" y="245" text-anchor="middle" font-family="Manrope, sans-serif" font-size="11" font-weight="700" fill="#FAF8F4" opacity="0.85">19:00</text>

  <!-- пол -->
  <rect x="0" y="290" width="400" height="30" fill="#1A1F3F"/>

  <!-- телевизор -->
  <rect x="220" y="195" width="120" height="76" rx="6" fill="#0B0E2A" stroke="#1F2329" stroke-width="3"/>
  <rect x="226" y="201" width="108" height="64" rx="3" fill="#F4A300"/>
  <!-- мерцающие полосы на экране -->
  <rect x="226" y="208" width="108" height="6" fill="#FFFFFF" opacity="0.6"/>
  <rect x="226" y="232" width="108" height="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="226" y="252" width="108" height="6" fill="#FFFFFF" opacity="0.5"/>
  <!-- ножка ТВ -->
  <rect x="270" y="271" width="20" height="10" fill="#1F2329"/>
  <rect x="252" y="280" width="56" height="4" rx="2" fill="#1F2329"/>

  <!-- диван -->
  <rect x="20" y="240" width="180" height="50" rx="10" fill="url(#couch)" stroke="#1F2329" stroke-width="3"/>
  <rect x="20" y="245" width="180" height="14" rx="6" fill="#7062AB" opacity="0.6"/>

  <!-- ребёнок 1 (левее) -->
  <circle cx="65" cy="232" r="13" fill="#FFD9B5" stroke="#1F2329" stroke-width="2"/>
  <!-- глаз — смотрит вправо на ТВ -->
  <circle cx="69" cy="232" r="2" fill="#1F2329"/>
  <rect x="55" y="245" width="22" height="22" rx="4" fill="#F4A300" stroke="#1F2329" stroke-width="2"/>

  <!-- ребёнок 2 (правее) -->
  <circle cx="120" cy="228" r="14" fill="#FFD9B5" stroke="#1F2329" stroke-width="2"/>
  <circle cx="125" cy="228" r="2" fill="#1F2329"/>
  <rect x="108" y="242" width="26" height="26" rx="4" fill="#5B4D8B" stroke="#1F2329" stroke-width="2"/>

  <!-- взрослый (правее) -->
  <circle cx="170" cy="222" r="16" fill="#FFD9B5" stroke="#1F2329" stroke-width="2"/>
  <circle cx="176" cy="222" r="2.2" fill="#1F2329"/>
  <rect x="156" y="238" width="30" height="32" rx="4" fill="#1E2A6E" stroke="#1F2329" stroke-width="2"/>
</svg>

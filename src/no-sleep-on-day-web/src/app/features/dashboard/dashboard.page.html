<div class="page">
  <app-hero />

  <section class="filters">
    <app-region-selector [regions]="regions()" [(value)]="regionId" />
    <app-wake-time-picker [(value)]="wakeTime" />
    <app-sleep-duration-picker [(value)]="sleepHours" />
    <app-period-selector [(value)]="period" />
  </section>

  <section class="results">
    <p class="results__period-label">{{ periodLabel() }}</p>

    @if (isLoading() && !analysis()) {
      <p class="results__loader">⏳ Считаем световые минуты…</p>
    }

    @if (error(); as e) {
      <p class="results__error">⚠ {{ e }}</p>
    }

    @if (analysis(); as a) {
      <app-summary-cards [analysis]="a" />
      <app-daylight-chart [analysis]="a" />
      <app-optimal-schedule-card [analysis]="a" />
    }
  </section>

  <footer class="page__footer">
    <p>
      Расчёт ведётся локально на основе астрономических формул (библиотека SunCalcNet).
      Без внешних API — все цифры детерминированы и воспроизводимы.
    </p>
  </footer>
</div>
